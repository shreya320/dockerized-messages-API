version: "8.3"

services:
  messages-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"


  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: messages
      POSTGRES_PASSWORD: messages
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - messages-app-data:/var/lib/postgresql/data

networks:
  default:
    name: messages-app-network
    driver: bridge

volumes:
  messages-app-data:

